name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
          cache: "bun"

      - name: Install dependencies
        run: bun install

      - name: Type check
        run: bun run lint

      - name: Run tests
        run: bun test
